<div class="product-card">
    <div class="product-image-container">
        <img src="./assets/images/product.jpg" alt="Nome do Produto" class="product-image">
        <span class="discount-badge">-20%</span>
    </div>
    
    <div class="product-info">
        <h3 class="product-name">Nome do Produto</h3>
        
        <div class="product-rating">
            <span class="stars">★★★★★</span>
            <span class="rating-count">(10 avaliações)</span>
        </div>
        
        <p class="product-description">Descrição breve do produto</p>
        
        <div class="product-price-section">
            <span class="product-price">R$ 49.90</span>
            <span class="product-original-price">R$ 99.90</span>
        </div>
        
        <button class="add-to-cart btn btn-primary" data-product-id="1">
            Adicionar ao Carrinho
        </button>
    </div>
</div>
